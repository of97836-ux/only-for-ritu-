<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ritu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Arial',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
}

.container{
text-align:center;
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,.2);
max-width:400px;
}

img{
width:180px;
border-radius:20px;
margin-bottom:15px;
}

h1{
color:#ff4d6d;
margin-bottom:20px;
}

.buttons{
position:relative;
height:80px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
color:white;
}

#yesBtn{
background:#ff4d6d;
}

#noBtn{
background:#666;
position:absolute;
margin-left:15px;
}

.heart{
position:absolute;
font-size:25px;
animation:float 4s linear forwards;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-700px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">

<img src="https://i.imgur.com/8Km9tLL.png">

<h1>Ritu ❤️<br>Do You Love Me? 🥺</h1>

<div class="buttons">
<button id="yesBtn" onclick="love()">Yes ❤️</button>
<button id="noBtn">No 😢</button>
</div>

</div>

<script>

const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-50);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});

function love(){

document.body.innerHTML=`
<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
text-align:center;
font-size:38px;
font-weight:bold;
">
❤️ Yaaay Ritu ❤️
<br><br>
I Love You Forever 🥰
</div>
`;

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=window.innerHeight+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

},150);

}

</script>

</body>
</html>
