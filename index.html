<!DOCTYPE html>
<html>
<head>
    <title>Bristy Chaos Mode 🤯</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            position: absolute;
            top: 40%;
            left: 35%;
            font-size: 60px;
            transition: all 0.2s;
        }

        .btn {
            position: absolute;
            bottom: 50px;
            left: 40%;
            padding: 20px 30px;
            font-size: 20px;
            background: crimson;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        .emoji {
            position: absolute;
            font-size: 35px;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-100px) rotate(0deg); }
            to { transform: translateY(100vh) rotate(720deg); }
        }

        .shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, -5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(5px, 5px); }
        }
    </style>
</head>
<body>

    <h1 id="name">👑 BRISTY 👑</h1>
    <button class="btn" onclick="chaosMode()">ENTER CHAOS</button>

    <script>
        function chaosMode() {
            document.body.classList.add("shake");

            // Flash colors
            setInterval(() => {
                document.body.style.background =
                    "#" + Math.floor(Math.random()*16777215).toString(16);
            }, 200);

            // Teleport name
            setInterval(() => {
                let name = document.getElementById("name");
                name.style.top = Math.random() * 80 + "%";
                name.style.left = Math.random() * 80 + "%";
            }, 300);

            // Emoji rain
            let emojis = ["😂","🔥","💥","⚡","🤯","😈","🎉"];
            setInterval(() => {
                let e = document.createElement("div");
                e.className = "emoji";
                e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                e.style.left = Math.random() * 100 + "%";
                document.body.appendChild(e);

                setTimeout(() => e.remove(), 3000);
            }, 200);
        }
    </script>

</body>
</html>
