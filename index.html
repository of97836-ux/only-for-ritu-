<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Only For Ritu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
overflow:hidden;
}

.card{
background:white;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
width:350px;
}

.photo{
width:220px;
height:220px;
object-fit:cover;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(255,105,180,.5);
}

h1{
color:#ff4d6d;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
color:white;
}

.yes{
background:#ff4d6d;
}

.no{
background:#777;
position:absolute;
}

.heart{
position:absolute;
font-size:30px;
animation:fly 4s linear forwards;
}

@keyframes fly{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-800px);
opacity:0;
}
}
</style>
</head>
<body>

<div class="card">
<img src="img1.jpg.jpeg" class="photo">

<h1>Ritu ❤️<br>Do You Love Me? 🥺</h1>

<button class="btn yes" onclick="love()">Yes ❤️</button>
<button class="btn no" id="noBtn">No 😢</button>
</div>

<script>

const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
let x=Math.random()*(window.innerWidth-120);
let y=Math.random()*(window.innerHeight-60);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});

function love(){

document.body.innerHTML=`
<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
font-size:42px;
font-weight:bold;
text-align:center;
">
❤️ Ritu ❤️
<br>
I Love You Forever 🥰
</div>
`;

setInterval(()=>{
let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=window.innerHeight+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

},120);

}
</script>

</body>
</html>
