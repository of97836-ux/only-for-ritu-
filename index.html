<!DOCTYPE html>
<html>
<head>
    <title>Bristy vs Me ⚔️</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            margin-top: 15%;
            font-size: 55px;
            animation: fight 1s infinite alternate;
        }

        p {
            font-size: 24px;
        }

        .blast {
            position: absolute;
            font-size: 40px;
            animation: explode 3s infinite;
        }

        @keyframes fight {
            from { transform: translateX(-20px); color: red; }
            to { transform: translateX(20px); color: cyan; }
        }

        @keyframes explode {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(4) rotate(720deg); opacity: 0; }
        }

        .btn {
            margin-top: 20px;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            background: crimson;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>⚔️ Me vs Bristy ⚔️</h1>
    <p>24/7 Clash Mode Activated 😈🔥</p>
    <p>But still the best sister ever 😂💙</p>

    <button class="btn" onclick="alert('Round 2 starts now 😆')">
        Start Fight
    </button>
    <button class="btn" onclick="round2()">
    Start Fight
</button>

<script>
function round2() {
    document.body.style.background = "darkred";
    document.querySelector("h1").innerText = "🔥 ROUND 2: BRISTY WINS 🔥";

    let blast = document.createElement("div");
    blast.innerHTML = "💥💥💥";
    blast.style.fontSize = "80px";
    blast.style.position = "absolute";
    blast.style.top = "40%";
    blast.style.left = "35%";

    document.body.appendChild(blast);
}
</script>

    <div class="blast" style="top:20%; left:20%;">💥</div>
    <div class="blast" style="top:50%; left:70%;">⚡</div>
    <div class="blast" style="top:70%; left:40%;">🔥</div>

</body>
</html>
